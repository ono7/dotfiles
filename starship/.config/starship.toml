# palette = "catppuccin_macchiato"
add_newline = true
palette = "catppuccin_mocha"

right_format="""
"""
# $python $git_branch"""
command_timeout = 1000

[hostname]
ssh_only = true
ssh_symbol = '🌏'
format = '[$ssh_symbol](bold blue) [$hostname](bold red) '
disabled = false

# Inserts a blank line between shell prompts
[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#8fd6e3"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
base = "#1e1e2e"
mantle = "#181825"
crust = "#11111b"

# Replace the "❯" symbol in the prompt with "➜"
[character]                            # The name of the module we are configuring is "character"
success_symbol = "[➜](bold green)"     # The "success_symbol" segment is being set to "➜" with the color "bold green"
# error_symbol = "[➜](bold red)"     # The "success_symbol" segment is being set to "➜" with the color "bold green"
error_symbol = "[🤮 ](bold red)"     # The "success_symbol" segment is being set to "➜" with the color "bold green"

# 🥷🏻
# success_symbol = "[🥷](bold green)"     # The "success_symbol" segment is being set to "➜" with the color "bold green"
# success_symbol = "[🐇](bold green)"     # The "success_symbol" segment is being set to "➜" with the color "bold green"
# success_symbol = "[➢ ](bold blue)"     # The "success_symbol" segment is being set to "➜" with the color "bold green"
# error_symbol = "[🤮 ](bold red)"     # The "success_symbol" segment is being set to "➜" with the color "bold green"

[cmd_duration]
min_time = 1_000

# Disable the package module, hiding it from the prompt completely
# [package]
# disabled = true

[directory]
# truncate_length = how many directories deep before path is truncated
truncation_length = 4
truncate_to_repo = false
# format = "[$path]($style)[$lock_symbol]($lock_style) "
format = "[$path]($style)[$read_only]($read_only_style) "
style ="sky bold"

# [memory_usage]
# format = '\[$symbol[$ram( | $swap)]($style)\]'

[git_branch]
# # symbol = "[ ](blue)"
# # symbol = "[ ](blue)"
# # symbol = "[ ](blue)"
# # 󰽜  
symbol = "[ ](bright white)"
format = '[$symbol$branch]($style)'

[git_status]
# up_to_date = "[✓](bold green)"
stashed = ""
ahead = "[⇡](blue)${count}"
# staged = '[++\($count\)](green)'
staged = '[++\($count\)](green)'
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
behind = "[⇣](blue)${count}"
format = '([$all_status$ahead_behind]($style)) '

[git_commit]
commit_hash_length = 8
style = "bold white"

[golang]
symbol = "[](cyan)"
format = '[$symbol]($style) Go '

# [python]
# symbol = "[](green)"
# format = '[${symbol}${pyenv_prefix} (${virtualenv})]($style) '

[python]
format = '[${pyenv_prefix}(${virtualenv})]($style) '

