# palette = "catppuccin_macchiato"
add_newline = true
palette = "catppuccin_mocha"

right_format="""
"""
# $python $git_branch"""
command_timeout = 500

[hostname]
ssh_only = true
ssh_symbol = '🌏'
format = '[$ssh_symbol](bold blue) [$hostname](bold red) '
disabled = false

[palettes.catppuccin_mocha]
red = "#C49A9A"
green = "#8CBBAD"
yellow = "#D4B97E"
blue = "#8CA7BE"

pink = "#B097B6"        # Using your magenta
mauve = "#B097B6"       # Also using magenta for mauve
maroon = "#C49A9A"      # A variation of your red
peach = "#D4B97E"       # Using your yellow as peach
teal = "#93B5B3"        # Using your cyan
sky = "#93B5B3"         # Also using cyan for sky
sapphire = "#8CA7BE"    # A variation of your blue
lavender = "#B097B6"    # Another use of your magenta

text = "#C9C2B8"        # Your white/cream
subtext1 = "#BAB3A9"    # Slightly darker than your cream
subtext0 = "#ABA49A"    # Even darker shade

overlay2 = "#9C958B"    # Derived from your white/cream
overlay1 = "#8D867C"    # Darker
overlay0 = "#7E776D"    # Even darker

surface2 = "#424B5E"    # Lighter than your black
surface1 = "#384051"    # Between your black and surface2
surface0 = "#2D3343"    # Your black

base = "#252A36"        # Darker than your black
mantle = "#1E222B"      # Even darker
crust = "#171A21"       # Darkest

rosewater = "#C9B8B8"   # Lighter version of your red
flamingo = "#C4A4A4"    # Between your red and rosewater

# Replace the "❯" symbol in the prompt with "➜"
[character]                            # The name of the module we are configuring is "character"
success_symbol = "[➜](bold green)"     # The "success_symbol" segment is being set to "➜" with the color "bold green"
# error_symbol = "[➜](bold red)"     # The "success_symbol" segment is being set to "➜" with the color "bold green"
error_symbol = "[🤮 ](bold red)"     # The "success_symbol" segment is being set to "➜" with the color "bold green"

# 🥷🏻
# success_symbol = "[🥷](bold green)"     # The "success_symbol" segment is being set to "➜" with the color "bold green"
# success_symbol = "[🐇](bold green)"     # The "success_symbol" segment is being set to "➜" with the color "bold green"
# success_symbol = "[➢ ](bold blue)"     # The "success_symbol" segment is being set to "➜" with the color "bold green"
# error_symbol = "[🤮 ](bold red)"     # The "success_symbol" segment is being set to "➜" with the color "bold green"

[cmd_duration]
min_time = 1_000

# Disable the package module, hiding it from the prompt completely
# [package]
# disabled = true

[directory]
# truncate_length = how many directories deep before path is truncated
truncation_length = 2
truncate_to_repo = false
# format = "[$path]($style)[$lock_symbol]($lock_style) "
format = "[$path]($style)[$read_only]($read_only_style) "
style ="sky bold"

# [memory_usage]
# format = '\[$symbol[$ram( | $swap)]($style)\]'

[git_branch]
# # symbol = "[ ](blue)"
# # symbol = "[ ](blue)"
# # symbol = "[ ](blue)"
# # 󰽜  
symbol = "[  ](bright white)"
format = '[$symbol$branch]($style)'

[git_status]
# up_to_date = "[✓](bold green)"
stashed = ""
ahead = "[⇡](blue)${count}"
# staged = '[++\($count\)](green)'
staged = '[++\($count\)](green)'
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
behind = "[⇣](blue)${count}"
format = '([$all_status$ahead_behind]($style)) '

[git_commit]
commit_hash_length = 8
style = "bold white"

[golang]
symbol = "[](cyan)"
format = '[$symbol]($style) Go '
disabled = true

# [python]
# symbol = "[](green)"
# format = '[${symbol}${pyenv_prefix} (${virtualenv})]($style) '

[python]
format = '[${pyenv_prefix}(${virtualenv})]($style) '

