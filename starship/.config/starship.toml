# Starship configuration - Elegant rounded style matching your Alacritty colors
# Save this as ~/.config/starship.toml

format = """
$os\
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$nodejs\
$rust\
$golang\
$php\
$python\
$docker_context\
$package\
$cmd_duration\
$line_break\
$character"""

# Disable the blank line at the start of the prompt
add_newline = false

# OS Symbol - subtle, no background
[os]
style = "fg:#8CA7BE"
disabled = false
format = "[$symbol ]($style)"

[os.symbols]
Windows = "у°ҚІ"
Ubuntu = "у°•Ҳ"
SUSE = ""
Raspbian = "у°җҝ"
Mint = "у°Јӯ"
Macos = "у°Җө"
Manjaro = ""
Linux = "у°ҢҪ"
Gentoo = "у°ЈЁ"
Fedora = "у°Јӣ"
Alpine = ""
Amazon = ""
Android = ""
Arch = "у°ЈҮ"
Artix = "у°ЈҮ"
CentOS = ""
Debian = "у°Јҡ"
Redhat = "уұ„ӣ"
RedHatEnterprise = "уұ„ӣ"

# Username - clean, minimal
[username]
show_always = false
style_user = "fg:#D4B97E"
style_root = "fg:#C49A9A bold"
format = "[$user]($style)[@](fg:#8087a2)"

# Hostname - only when SSH
[hostname]
ssh_only = true
style = "fg:#8CA7BE"
format = "[$hostname]($style) "

# Directory - with elegant icon
[directory]
style = "fg:#E3DED7 bold"
format = "[  $path]($style) "
truncation_length = 3
truncation_symbol = "вҖҰ/"
read_only = " у°Ңҫ"
read_only_style = "fg:#C49A9A"

[directory.substitutions]
"Documents" = "у°Ҳҷ Docs"
"Downloads" = "  Downloads"
"Music" = "у°қҡ Music"
"Pictures" = "  Pictures"
"Developer" = "у°ІӢ Dev"
"~" = "у°Ӣң ~"

# Git Branch - clean and minimal
[git_branch]
symbol = ""
style = "fg:#8CBBAD"
format = "[on $symbol$branch]($style)"

# Git Status - clean indicators
[git_status]
style = "fg:#C49A9A"
format = "[$all_status$ahead_behind]($style)"
conflicted = "вҡЎ"
ahead = "вҮЎ${count} "
behind = "вҮЈ${count} "
diverged = "вҮ•вҮЎ${ahead_count}вҮЈ${behind_count} "
up_to_date = ""
untracked = "?${count} "
stashed = "рҹ“Ұ"
modified = "!${count} "
staged = "+${count} "
renamed = "В»${count} "
deleted = "вңҳ${count} "

# Language/Tool Indicators - floating style
[nodejs]
symbol = " "
style = "fg:#8CBBAD"
format = "[( $symbol$version )]($style)"

[rust]
symbol = " "
style = "fg:#C49A9A"
format = "[( $symbol$version )]($style)"

[golang]
symbol = " "
style = "fg:#93B5B3"
format = "[( $symbol$version )]($style)"

[php]
symbol = " "
style = "fg:#B097B6"
format = "[( $symbol$version )]($style)"

[python]
symbol = " "
style = "fg:#D4B97E"
format = "[( $symbol$version )]($style)"

[docker_context]
symbol = " "
style = "fg:#8CA7BE"
format = "[( $symbol$context )]($style)"

# Package version - subtle
[package]
style = "fg:#C9C2B8"
format = "[(рҹ“Ұ $version )]($style)"

# Command duration - only show if > 2 seconds
[cmd_duration]
min_time = 2000
style = "fg:#8087a2 italic"
format = "[( $duration )]($style)"

# Line break
[line_break]
disabled = false

# Character - elegant arrows
[character]
disabled = false
success_symbol = "[в•°в”ҖвқҜ](bold fg:#8CBBAD)"
error_symbol = "[в•°в”ҖвқҜ](bold fg:#C49A9A)"
vimcmd_symbol = "[в•°в”ҖвҰҝ](bold fg:#D4B97E)"
vimcmd_replace_one_symbol = "[в•°в”ҖвҰҝ](bold fg:#B097B6)"
vimcmd_replace_symbol = "[в•°в”ҖвҰҝ](bold fg:#B097B6)"
vimcmd_visual_symbol = "[в•°в”ҖвҰҝ](bold fg:#93B5B3)"

# Time - only show on right side if needed
[time]
disabled = true
time_format = "%R"
style = "fg:#8087a2"
format = "[рҹ•җ $time]($style)"

# Battery - clean indicators
[battery]
full_symbol = "рҹ”Ӣ"
charging_symbol = "рҹ”Ң"
discharging_symbol = "вҡЎ"
format = "[$symbol$percentage]($style) "

[[battery.display]]
threshold = 30
style = "bold fg:#C49A9A"

[[battery.display]]
threshold = 60
style = "fg:#D4B97E"

[[battery.display]]
threshold = 100
style = "fg:#8CBBAD"

# Status - minimal error display
[status]
style = "fg:#C49A9A"
symbol = "вң—"
success_symbol = ""
format = "[$symbol$int]($style) "
map_symbol = true
disabled = false

# Cloud services - subtle when present
[aws]
symbol = "вҳҒпёҸ  "
style = "fg:#D4B97E"
format = "[($symbol$profile )]($style)"

[azure]
disabled = false
format = "[($symbol$subscription )]($style)"
symbol = "вҳҒпёҸ  "
style = "fg:#8CA7BE"

[gcloud]
symbol = "вҳҒпёҸ  "
style = "fg:#C49A9A"
format = "[($symbol$project )]($style)"

# Kubernetes - when relevant
[kubernetes]
symbol = "вӣө "
style = "fg:#93B5B3"
format = "[($symbol$context )]($style)"
disabled = false

# Memory usage - minimal
[memory]
disabled = false
threshold = 75
symbol = "рҹ§  "
style = "fg:#B097B6"
format = "[($symbol${ram_pct} )]($style)"

# Jobs indicator
[jobs]
symbol = "вҡҷпёҸ "
style = "fg:#D4B97E"
number_threshold = 1
format = "[$symbol$number]($style) "
