# WSL alacritty location
# /mnt/c/Users/jl78/AppData/Roaming/alacritty/alacritty.toml

[general]
live_config_reload = true
working_directory = "None"

[colors]
draw_bold_text_with_bright_colors = false

[colors.primary]
# background = "#1D2433"         # Muted navy
background = "#161b27" # slighty darker for windows
foreground = "#E3DED7"         # Antique paper
dim_foreground = "#8087a2"     # Subdued blue-gray
bright_foreground = "#cad3f5"  # Bright lavender-tinted white

[colors.cursor]
cursor = "#B4ADA0"            # Muted foreground for cursor
text = "#1D2433"

[colors.vi_mode_cursor]
cursor = "#B4ADA0"            # Muted foreground for cursor
text = "#1D2433"

[colors.search.matches]
foreground = "#24273a"
background = "#a5adcb"

[colors.search.focused_match]
foreground = "#24273a"
background = "#a6da95"

[colors.footer_bar]
foreground = "#24273a"
background = "#a5adcb"

[colors.hints.start]
foreground = "#24273a"
background = "#eed49f"

[colors.hints.end]
foreground = "#24273a"
background = "#a5adcb"

[colors.selection]
# text = "#24273a"
background = "#364156"

[colors.normal]
black = "#2D3343"         # Slightly lighter than background
red = "#C49A9A"           # Muted dusty rose
green = "#8CBBAD"         # Soft sage green
yellow = "#D4B97E"        # Gentle amber
blue = "#8CA7BE"          # Muted steel blue
magenta = "#B097B6"       # Soft lavender
cyan = "#93B5B3"          # Muted teal
white = "#C9C2B8"         # Soft cream (slightly darker than foreground)

[colors.bright]
black = "#3E485A"     # Medium gray-blue
red = "#D5AFAF"       # Lighter dusty rose
green = "#A2CFBF"     # Lighter sage
yellow = "#E1CA97"    # Lighter amber
blue = "#A4BCCE"      # Lighter steel blue
magenta = "#C4AFC8"   # Lighter lavender
cyan = "#A9C9C7"      # Lighter teal
white = "#E3DED7"     # Same as foreground

[[colors.indexed_colors]]
index = 16
color = "#B6A58B"  # Soft muted tan/bronze

[[colors.indexed_colors]]
index = 17
color = "#A6B0C3"  # Soft muted periwinkle

[cursor]
blink_interval = 200
blink_timeout = 0
unfocused_hollow = true

[cursor.style]
blinking = "Never"
shape = "Block"

[debug]
log_level = "Off"
persistent_logging = false
print_events = false
render_timer = false

[env]
# TERM = "xterm-256color"
LC_CTYPE = "en_US.UTF-8"

[font]
size = 17.0

[font.normal]
family = "SF Mono"
style = "Regular"


[font.offset]
x = 0
y = 8

[keyboard]
bindings = [
	{ key = "-", mods = "Control", action = "DecreaseFontSize" },
	{ key = "=", mods = "Control", action = "IncreaseFontSize" },
	{ key = "Back", mods = "Alt", chars = "\u0017" },
	{ key = "Back", mods = "Control", chars = "\u0017" },
	{ key = "F", mods = "Control|Shift", action = "ToggleFullscreen" },
	{ key = "H", mods = "Control", action = "ReceiveChar" },
	{ key = "H", mods = "Control|Shift", action = "SelectPreviousTab" },
	{ key = "L", mods = "Control|Shift", action = "SelectNextTab" },
	{ key = "Q", mods = "Control", action = "None" },
	{ key = "Space", mods = "Control|Shift", mode = "~Search", action = "ToggleViMode" },
	{ key = "Space", mods = "Control", chars = "\u0000" },
	{ key = "V", mods = "Control|Shift", action = "Paste" },
	{ key = "W", mods = "command|Shift", action = "Quit" },
]

[mouse]
hide_when_typing = true

[[mouse.bindings]]
action = "PasteSelection"
mouse = "Right"

[scrolling]
history = 10000
multiplier = 3

[selection]
save_to_clipboard = true
semantic_escape_chars = ",│`|:\"' ()[]{}<>"

[terminal]
shell = "wsl.exe ~"

[window]
decorations = "full"
dynamic_padding = false
dynamic_title = true
opacity = 1
blur = true # does not work in windows?
startup_mode = "Maximized"
option_as_alt = "both"

[window.dimensions]
columns = 82
lines = 28

[window.padding]
x = 5
y = 5
