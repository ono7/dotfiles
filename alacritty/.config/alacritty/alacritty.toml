live_config_reload = true
working_directory = "None"

[terminal]
# osc52 = "Disabled" | "OnlyCopy" | "OnlyPaste" | "CopyPaste"
osc52 = "CopyPaste"

[colors]
draw_bold_text_with_bright_colors = false


[colors.bright]
black = "#7c8f8f"
blue = "#82aaff"
cyan = "#7fdbca"
green = "#21c7a8"
magenta = "#ae81ff"
red = "#ff5874"
white = "#d6deeb"
yellow = "#ecc48d"

[colors.normal]
black = "#1d3b53"
blue = "#82aaff"
cyan = "#7fdbca"
green = "#a1cd5e"
magenta = "#c792ea"
red = "#fc514e"
white = "#a1aab8"
yellow = "#e3d18a"

[colors.primary]
# background = "#011627"
# foreground = "#bdc1c6"
background = "#0e1419"
foreground = "#e5e1cf"
# bright_foreground = "#eeeeee"

[colors.selection]
background = "#b2ceee"
text = "#080808"

[cursor]
blink_interval = 200
unfocused_hollow = true

[colors.cursor]
cursor =  "#5f6060"
text = "#080808"

[cursor.style]
blinking = "Never"
shape = "Block"

[debug]
log_level = "Off"
persistent_logging = false
print_events = false
render_timer = false

[env]
TERM = "xterm-256color"

[font]
size = 22.0

[font.glyph_offset]
x = 0
y = 0

[font.normal]
family = "MonolisaLiga Nerd Font"
style = "Medium Regular"

[font.italic]
family = "MonolisaLiga Nerd Font"
style = "Italic"

[font.bold]
family = "MonolisaLiga Nerd Font"

[font.offset]
x = 0
y = 10

# https://www.reddit.com/r/neovim/comments/mbj8m5/how_to_setup_ctrlshiftkey_mappings_in_neovim_and/

[[keyboard.bindings]]
action = "Paste"
key = "V"
mods = "Control|Shift"

[[keyboard.bindings]]
action = "CreateNewTab"
key = "T"
mods = "Control|Shift"

[[keyboard.bindings]]
action = "SelectPreviousTab"
key = "H"
mods = "Control|Shift"

[[keyboard.bindings]]
action = "SelectNextTab"
key = "L"
mods = "Control|Shift"

# toggle simple full screen
[[keyboard.bindings]]
action = "ToggleFullscreen"
key = "F"
mods = "Control|Shift"

[[keyboard.bindings]]
chars = "\u0017"
key = "Back"
mods = "Alt"

[mouse]
hide_when_typing = true

[[mouse.bindings]]
action = "PasteSelection"
mouse = "Middle"

[scrolling]
history = 5000
multiplier = 3

[selection]
save_to_clipboard = true

# semantic_escape_chars = ",│`|:\"' ()[]{}<>"

[shell]
args = ["--login"]
program = "/bin/zsh"

[window]
# decorations = "buttonless"
decorations = "Full"
dynamic_padding = true
dynamic_title = true
opacity = 0.70
blur = true

startup_mode = "Windowed"
option_as_alt = "both"

[window.dimensions]
columns = 82
lines = 28

[window.padding]
x = 5
y = 5
