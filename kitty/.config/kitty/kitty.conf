# see settings https://sw.kovidgoyal.net/kitty/conf/

############## THEME SETTINGS #################

include ~/.config/kitty/kitty-current-theme.conf

############## FONT SETTINGS #################

# https://github.com/tonsky/FiraCode?tab=readme-ov-file
# font_family      FiraCode Retina

# font_family      MonolisaLiga Nerd Font Medium Regular
font_family      Monolisa NoLiga Medium
# font_family      Menlo
bold_font        auto
italic_font      auto
bold_italic_font auto

disable_ligatures always

font_size 24.0
adjust_line_height 137%

# see firacode github for alt codes :)
# font_features FiraCode-Nerd-Font-MonoRegular +cv06 +cv01 +cv02 +ss01 +ss03 +ss08 +cv14
# font_features FiraCode-Nerd-Font-MonoLight +cv06 +cv01 +cv02 +ss01 +ss03 +ss08 +cv14
# font_features FiraCode-Nerd-Font-MonoRetina +cv06 +cv01 +cv02 +ss01 +ss03 +ss08 +cv14
# font_features FiraCode-Nerd-Font-MonoMedium +cv06 +cv01 +cv02 +ss01 +ss03 +ss08 +cv14
# font_features FiraCode-Nerd-Font-MonoBold +cv06 +cv01 +cv02 +ss01 +ss03 +ss08 +cv14
# font_features FiraCode-Nerd-Font-MonoSemiBold +cv06 +cv01 +cv02 +ss01 +ss03 +ss08 +cv14

# font_features FiraCode-Regular +cv06 +cv01 +cv02 +ss01 +ss03 +ss08 +cv14
# font_features FiraCode-Light +cv06 +cv01 +cv02 +ss01 +ss03 +ss08 +cv14
# font_features FiraCode-Retina +cv06 +cv01 +cv02 +ss01 +ss03 +ss08 +cv14
# font_features FiraCode-Medium +cv06 +cv01 +cv02 +ss01 +ss03 +ss08 +cv14
# font_features FiraCode-Bold +cv06 +cv01 +cv02 +ss01 +ss03 +ss08 +cv14
# font_features FiraCode-SemiBold +cv06 +cv01 +cv02 +ss01 +ss03 +ss08 +cv14


############## TAB SETTINGS #################

tab_bar_edge top
tab_bar_margin_width 10
tab_bar_margin_height 15 0
tab_fade 0
tab_bar_style powerline

# tab_title_template grabs title from shell
tab_title_template "{title}"
# angled, slanted, round
tab_powerline_style slanted
tab_title_template "{title.lower()}"
# tab_title_template "{fmt.fg.red}{bell_symbol}{activity_symbol}{fmt.fg.tab}{title}"

############## SHELL SETTINGS #################

shell_integration enabled

# Disable shell integration features that change the cursor
shell_integration no-cursor

shell /bin/zsh --login
term xterm-kitty

############## REMOTE SETTINGS #################

allow_remote_control yes
listen_on none

############## WINDOW SETTINGS #################

# pink cursor
# cursor #d586ff

# darker cursor is out of the way and not so distracting, less typos
cursor #5f6060

cursor_text_color  #080808
cursor_shape block
cursor_blink_interval 0

scrollback_lines 5000
remember_window_size yes
window_border_width 4
window_margin_width 4
hide_window_decorations titlebar-only
confirm_os_window_close 1
placement_strategy center

enable_audio_bell no
visual_bell_duration 0.0

clipboard_control write-clipboard write-primary read-clipboard

# background_opacity 0.97
# cursor_blink_interval 0.2
# cursor_stop_blinking_after 999.0
# scrollback_pager_history_size 2

############## PERFORMANCE SETTINGS #################

input_delay 0
repaint_delay 1
sync_to_monitor no
wayland_enable_ime no

############## MOUSE SETTINGS #############

mouse_hide_wait 2.0
copy_on_select yes

# right click to paste
# mouse_map right press ungrabbed paste_from_selection
mouse_map right press ungrabbed paste_selection_or_clipboard

# fixes URL issues...?
mouse_map left click ungrabbed no-op

# TODO: change this colors
selection_foreground #000000
selection_background #fffacd

# none, straight, double, curly, dotted, dashed
url_style dotted

############## MACOS SETTINGS #############

# macos_colorspace srgb
macos_colorspace displayp3

macos_thicken_font 0.5

macos_quit_when_last_window_closed yes
macos_option_as_alt yes

############## KEYMAP SETTINGS #################

# clear default bindings to this point
clear_all_shortcuts yes

# map command+t no_op

map ctrl+equal change_font_size all +1.0
map ctrl+minus change_font_size all -1.0
map ctrl+0 change_font_size all 0

map ctrl+shift+v paste_from_clipboard

# del word
map ctrl+backspace send_text all \x17

# del line
map alt+backspace send_text all \x15

# c-/
map cmd+/ send_text all \x1f

# c-]
map cmd+] send_text all \x1d

# c-[
map cmd+[ send_text all \x1b

# c-^
map cmd+6 send_text all \x1e

# c-a
map cmd+a send_text all \x01

# c-x
map cmd+x send_text all \x18

# c-s
map cmd+s send_text all \x13

# c-r
map cmd+r send_text all \x12

# c-e
map cmd+e send_text all \x05

# c-p
map cmd+p send_text all \x10

# c-n
map cmd+n send_text all \x0e

# c-c
map cmd+c send_text all \x03

# c-t
map cmd+t send_text all \x14

# c-z
map cmd+z send_text all \x1a

# c-i
map cmd+i send_text all \x09

# c-o
map cmd+o send_text all \x0f

# c-u
map cmd+u send_text all \x15

# c-b
map cmd+b send_key ctrl+b

# c-d
map cmd+d send_text all \x04

# c-v
map cmd+v send_text all \x16

# c-w
# map cmd+w send_text all \x17

# mod+m tmux pane zoom toggle, this is not valid with tmux
# map ctrl+m combine : send_key ctrl+b : send_key z

# c-\
# map cmd+\ send_text all \x1b

# c-g
map cmd+g send_text all \x07

# c-f
map cmd+f send_text all \x06

# c-l
map cmd+l send_text all \x0c

# c-h
map cmd+h send_text all \x08

# c-j
map cmd+j send_text all \x0a

# c-k
map cmd+k send_text all \x0b

# c-q
map cmd+q send_text all \x11

### WINDOW BINDINGS ###

# map ctrl+shift+. next_tab
# map ctrl+shift+, previous_tab

# windows

draw_minimal_borders yes
window_border_width 0.1pt
macos_traditional_fullscreen yes

# map ctrl+shift+n new_window_with_cwd
map ctrl+shift+enter new_window_with_cwd
map ctrl+shift+f toggle_fullscreen
map ctrl+shift+k next_window
map ctrl+shift+j previous_window
map ctrl+shift+d close_window

# tabs
map ctrl+shift+t new_tab_with_cwd
map ctrl+shift+l next_tab
map ctrl+shift+h previous_tab
map ctrl+shift+w close_tab
map ctrl+shift+n set_tab_title
map alt+q quit

# scrollback buffer
map ctrl+shift+b launch --stdin-source=@screen_scrollback --type=overlay nvim
map ctrl+shift+p show_scrollback

# kitty config
map f1 show_kitty_doc conf
map ctrl+shift+r load_config_file

# mac
map opt+cmd+h hide_macos_other_apps
map opt+cmd+m hide_macos_app

# vim
map alt+i send_key ctrl+space
