# see settings https://sw.kovidgoyal.net/kitty/conf/

############## THEME SETTINGS #################

include ~/.config/kitty/kitty-current-theme.conf

############## FONT SETTINGS #################

# font_family      MonolisaLiga Nerd Font

font_family      Menlo
bold_font        auto
italic_font      auto
bold_italic_font auto

font_size 20.0
adjust_line_height 140%
font_features none
disable_ligatures all always

# see firacode github for alt codes :)
# font_features FiraCode-Regular +cv06 +cv01 +cv02 +ss01 +ss03 +ss08 +cv14
# font_features FiraCode-Light +cv06 +cv01 +cv02 +ss01 +ss03 +ss08 +cv14
# font_features FiraCode-Retina +cv06 +cv01 +cv02 +ss01 +ss03 +ss08 +cv14
# font_features FiraCode-Medium +cv06 +cv01 +cv02 +ss01 +ss03 +ss08 +cv14
# font_features FiraCode-Bold +cv06 +cv01 +cv02 +ss01 +ss03 +ss08 +cv14
# font_features FiraCode-SemiBold +cv06 +cv01 +cv02 +ss01 +ss03 +ss08 +cv14

############## WINDOW SETTINGS #################

cursor #d586ff
# cursor #c384ff

cursor_text_color  #080808
cursor_shape block
cursor_blink_interval 0

scrollback_lines 1000
remember_window_size yes
window_border_width 4
window_margin_width 4
hide_window_decorations titlebar-only
tab_title_template "term: {title.lower()}"
confirm_os_window_close 0
placement_strategy center

enable_audio_bell no
visual_bell_duration 0

clipboard_control write-clipboard write-primary read-clipboard

# background_opacity 0.97
# background_opacity 1.00
# cursor_blink_interval 0.2
# cursor_stop_blinking_after 999.0
# scrollback_pager_history_size 2

############## SHELL SETTINGS #################

term xterm-kitty

shell_integration disabled

shell /bin/zsh --login

############## REMOTE SETTINGS #################

allow_remote_control no
listen_on none

############## PERFORMANCE SETTINGS #################

# 150~ FPS for MBP display (untested)
repaint_delay 8

# Remove artificial input delay
input_delay 0

# turn off vsync
sync_to_monitor no

############## MOUSE SETTINGS #############

mouse_hide_wait 2.0
copy_on_select yes

selection_foreground #000000
selection_background #fffacd

# none, straight, double, curly, dotted, dashed
url_style dotted

############## MACOS SETTINGS #############

# macos_colorspace srgb
macos_colorspace displayp3

# macos_thicken_font 0.4

macos_quit_when_last_window_closed yes
macos_option_as_alt yes

############## KEYMAP SETTINGS #################

# clear default bindings to this point
clear_all_shortcuts yes

# map command+t no_op

map cmd+equal change_font_size all +1.0
map cmd+minus change_font_size all -1.0
map cmd+0 change_font_size all 0

map cmd+shift+v paste_from_clipboard

# new_os_window or new_os_window_with_cwd
map cmd+shift+n new_os_window
map cmd+shift+f toggle_fullscreen
map alt+w close_os_window
map alt+q quit

# del word
map cmd+backspace send_text all \x17

# del line
map alt+backspace send_text all \x15

# c-/
map cmd+/ send_key ctrl-/

# c-]
map cmd+] send_text all \x1d

# c-[
map cmd+[ send_text all \x1b

# c-^
map cmd+6 send_text all \x1e

# c-a
map cmd+a send_text all \x01

# c-x
map cmd+x send_text all \x18

# c-s
map cmd+s send_text all \x13

# c-r
map cmd+r send_text all \x12

# c-e
map cmd+e send_text all \x05

# c-p
map cmd+p send_text all \x10

# c-n
map cmd+n send_text all \x0e

# c-c
map cmd+c send_text all \x03

# c-t
map cmd+t send_text all \x14

# c-z
map cmd+z send_text all \x1a

# c-i
map cmd+i send_text all \x09

# c-o
map cmd+o send_text all \x0f

# c-u
map cmd+u send_text all \x15

# c-b
map cmd+b send_text all \x02

# c-d
map cmd+d send_text all \x04

# c-v
map cmd+v send_text all \x16

# c-w
map cmd+w send_text all \x17

# mod+m tmux pane zoom toggle
map cmd+m combine : send_key ctrl+b : send_key z

# c-\
map cmd+\ send_text all \x1b

# c-g
map cmd+g send_text all \x07

# c-f
map cmd+f send_text all \x06

# c-l
map cmd+l send_text all \x0c

# c-h
map cmd+h send_text all \x08

# c-j
map cmd+j send_text all \x0a

# c-k
map cmd+k send_text all \x0b

# c-q
map cmd+q send_text all \x11
