---
extends: default

ignore:
  - '*.template.yaml'
  - venv/
  - .collections
  - backups/

rules:
  line-length:
    max: 600
    level: warning
  empty-lines:
    max: 1
    level: warning
  comments:
    min-spaces-from-content: 1
  comments-indentation: false
  braces:
    max-spaces-inside: 1
  octal-values:
    forbid-implicit-octal: true
    forbid-explicit-octal: true
