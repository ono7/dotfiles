# vi: ft=yaml.ansible

- name: "Test"
  hosts: localhost
  gather_facts: false
  connection: local

  tasks:
    - name: Deploy block
      block:
        - name: Test 1 # noqa: no-changed-when
          ansible.builtin.shell: echo $$
          register: output
          failed_when: true
          ignore_errors: true

        - name: Test 2 # noqa: no-changed-when
          ansible.builtin.shell: echo $$
          register: output
          failed_when: true

        - name: Test 3 # noqa: no-changed-when
          ansible.builtin.shell: echo $$
          register: output

        - name: BUILD PASS
          ansible.builtin.debug:
            msg: |
              {{ output }}
      rescue:
        - name: BUILD FAILED
          ansible.builtin.debug:
            msg: |
              {{ output }}
          failed_when: always
